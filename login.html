{% extends "layout.html" %}
{% block content %}
<div class="container-fluid" style="background: #212529; min-height: 100vh; display: flex; align-items: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card bg-white shadow-2xl p-5 border-0">
                    <div class="text-center mb-4">
                        <div class="bg-danger text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                            <i class="bi bi-shield-lock-fill fs-3"></i>
                        </div>
                        <h2 class="fw-extrabold text-dark">Portal Login</h2>
                        <p class="text-muted small">Enter your Team_7 credentials</p>
                    </div>
                    <form method="POST">
                        <div class="mb-3">
                            <input type="text" name="username" class="form-control form-control-lg bg-light border-0 py-3" placeholder="Email or Username" required>
                        </div>
                        <div class="mb-4">
                            <input type="password" name="password" class="form-control form-control-lg bg-light border-0 py-3" placeholder="Password" required>
                        </div>
                        <button class="btn btn-danger w-100 btn-lg fw-bold rounded-pill py-3 shadow">ACCESS SYSTEM</button>
                    </form>
                    <div class="text-center mt-4">
                        <a href="/register" class="text-danger small fw-bold text-decoration-none">Create a new account →</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

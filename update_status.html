{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white"><h4>Post Tracking Update</h4></div>
            <div class="card-body">
                <form action="/update-status" method="POST">
                    <div class="mb-3">
                        <label>Consignment No</label>
                        <input type="text" name="cons_no" class="form-control" placeholder="e.g. IV2NPH7H" required>
                    </div>
                    <div class="mb-3">
                        <label>Current Location (City)</label>
                        <input type="text" name="city" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Update Status</label>
                        <select name="status" class="form-select">
                            <option value="In Transit">In Transit</option>
                            <option value="Reached Hub">Reached Hub</option>
                            <option value="Out for Delivery">Out for Delivery</option>
                            <option value="Delivered">Delivered</option>
                            <option value="Delayed">Delayed</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Notes/Comments</label>
                        <textarea name="comments" class="form-control" rows="2" placeholder="e.g. Weather delay or Gate code needed"></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Update Shipment</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

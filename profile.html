{% extends "layout.html" %}
{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card p-4 shadow-sm border-0 text-center">
            <i class="bi bi-person-circle fs-1 text-danger mb-2"></i>
            <h4 class="fw-bold">{{ user_info.fullname }}</h4>
            <p class="text-muted small">{{ user_info.email }}</p>
            <hr>
            <a href="/logout" class="btn btn-sm btn-outline-danger w-100">Sign Out</a>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card p-4 shadow-sm border-0">
            <h4 class="fw-bold mb-4">My Shipment History</h4>
            <table class="table">
                <thead><tr class="small text-uppercase"><th>Order #</th><th>Date</th><th>Action</th></tr></thead>
                <tbody>
                    {% for o in orders %}
                    <tr>
                        <td class="fw-bold text-danger">{{ o.cons_no }}</td>
                        <td class="small">{{ o.pick_date.strftime('%Y-%m-%d') }}</td>
                        <td><a href="/download-receipt/{{ o.cons_no }}" class="btn btn-sm btn-dark">Receipt</a></td>
                    </tr>
                    {% else %}
                    <tr><td colspan="3" class="text-center py-4">No shipments yet.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% extends "layout.html" %}
{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 card border-0 shadow-lg p-5 rounded-5 bg-white">
            <h3 class="fw-bold text-center text-danger mb-4">Request a Pickup</h3>
            
            <div class="alert alert-info border-0 rounded-4 small mb-4">
                <i class="bi bi-info-circle-fill me-2"></i> 
                Hello <strong>{{ user.fullname }}</strong>, we will use your registered address and contact details as the sender information.
            </div>

            <form method="POST">
                <div class="row g-3">
                    <div class="col-12"><h5 class="fw-bold text-muted">Recipient Information</h5></div>
                    <div class="col-md-6">
                        <label class="small fw-bold">Receiver Name</label>
                        <input type="text" name="rev_name" class="form-control bg-light border-0 py-2" placeholder="Full Name" required>
                    </div>
                    <div class="col-md-6">
                        <label class="small fw-bold">Receiver Phone</label>
                        <input type="tel" name="receiver_phone" class="form-control bg-light border-0 py-2" placeholder="510-XXX-XXXX" required>
                    </div>
                    <div class="col-12">
                        <label class="small fw-bold">Receiver Full Address</label>
                        <textarea name="receiver_address" class="form-control bg-light border-0 py-2" rows="2" placeholder="Street, City, Zip Code" required></textarea>
                    </div>

                    <div class="col-12 mt-4"><h5 class="fw-bold text-muted">Parcel Details</h5></div>
                    <div class="col-md-4">
                        <label class="small fw-bold">Weight (kg)</label>
                        <input type="number" step="0.1" min="0.1" max="500" name="weight" class="form-control bg-light border-0 py-2" placeholder="0.0" required>
                    </div>
                    <div class="col-md-4">
                        <label class="small fw-bold">Package Type</label>
                        <select name="p_type" class="form-select bg-light border-0 py-2">
                            <option>Box</option>
                            <option>Pallet</option>
                            <option>Envelope</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="small fw-bold">Priority</label>
                        <select name="priority" class="form-select bg-light border-0 py-2">
                            <option>Standard</option>
                            <option>Express</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="small fw-bold">Contents Description</label>
                        <input type="text" name="contents_description" class="form-control bg-light border-0 py-2" placeholder="e.g. Books, Electronics" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-danger w-100 fw-bold py-3 mt-4 rounded-pill shadow">CONFIRM PICKUP REQUEST</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
